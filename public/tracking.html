// Export functions
function exportToExcel(rows, filename, sheetName){
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb,ws,sheetName||'Report');
  XLSX.writeFile(wb,filename);
}

function exportReportA(){
  const rows=state.batches.filter(b=>!b.deleted).map(b=>({
    'Batch':b.batchNumber,'Customer':b.customer,'Machine':b.machineId,'Size':b.size,'Printed':b.isPrinted?'Y':'N',
    'Labels Generated':getLabelsByBatch(b.batchNumber).length,
    'WIP Days':fmt(getBatchWIPDays(b.batchNumber),1),
    'Est Dispatch':calcDispatchDate(b),
    'A-Grade %':fmt(getBatchAGrade(b.batchNumber,b.isPrinted?'printed':'unprinted').pct,1),
    'Dispatched (L)':fmt(state.dispatchRecs.filter(r=>r.batchNumber===b.batchNumber).reduce((s,r)=>s+r.qty,0))

}

function exportReportB(){
  const rows=[];
  ['aim','printing','pi','packing'].forEach(dept=>{
    [...new Set(state.scans.filter(s=>s.dept===dept).map(s=>s.batchNumber))].forEach(batchNo=>{
      const b=getBatch(batchNo);
      const inn=state.scans.filter(s=>s.batchNumber===batchNo&&s.dept===dept&&s.type==='in').length;
      const out=state.scans.filter(s=>s.batchNumber===batchNo&&s.dept===dept&&s.type==='out').length;

      rows.push({'Department':DEPT_LABELS[dept],'Batch':batchNo,'Customer':b?.customer||'','Boxes IN':inn,'Boxes OUT':out,'WIP Boxes':Math.max(0,inn-out),'Hours in Dept':firstIn?hoursAgo(firstIn.ts).toFixed(0):0,'Alert':state.alerts.some(a=>a.batchNumber===batchNo&&a.dept===dept)?'YES':''});
    });
  });
  exportToExcel(rows,`Sunloc_DeptWIP_${today()}.xlsx`,'Dept WIP');
}

function exportReportC(){
  const rows=state.batches.filter(b=>!b.deleted).map(b=>{
    const wipDays=getBatchWIPDays(b.batchNumber);

function saveServerUrl(){
  serverUrl=sanitizeServerUrl(document.getElementById('s-server')?.value||'');
  localStorage.setItem('sunloc_server_url',serverUrl);
  checkServer().then(ok=>{
    if(ok){
      pullFromServer().then(()=>{
        const msg = state.batches.length > 0
          ? '✅ Server connected! ' + state.batches.length + ' batches loaded from Planning App.'
          : '⚠️ Server connected but 0 batches found. Open Planning App and make sure orders are saved, then click Save & Test again.';
        alert(msg);
      });
    } else {
      alert('❌ Could not connect to server. Check URL.');
    }
  });
}

function savePrinterUrl(){
  const url=document.getElementById('s-printer')?.value.trim()||'';

function clearAllScans(){
  if(!confirm('⚠️ ADMIN: Clear ALL scan data? This cannot be undone.')) return;
  state.scans=[]; state.stageClosure=[]; state.wastage=[]; state.alerts=[];
  saveLocal(); renderPage(currentPage); alert('Scans cleared.');
}

function resetApp(){
  if(!confirm('⚠️ ADMIN: Reset ALL tracking data? This will delete labels, scans, and records.')) return;
  state.labels=[]; state.scans=[]; state.stageClosure=[]; state.wastage=[]; state.alerts=[]; state.dispatchRecs=[];
  localStorage.removeItem('sunloc_tracking');
  renderPage(currentPage); alert('App data reset.');
}

// TRACKING — Audit log (admin role already handled by currentDept)
// ══════════════════════════════════════════════════════
async function trkAuditLog(action, details) {
  if (!serverUrl || !currentDept) return;
  const token = localStorage.getItem('trk_token');
  if (!token) return;
  try {
    await fetch(serverUrl + '/api/audit/log', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token, action, details }),
      signal: AbortSignal.timeout(3000)
    });
  } catch(e) {}
}

// Audit logging — called after successful login in doLogin()
// No monkey-patching needed — tracking uses doLogin() directly

// Audit log view for tracking admin
async function renderTrackingAuditLog() {
  const el = document.getElementById('page-settings');
  if (!el || currentDept !== 'admin') return;

  const token = localStorage.getItem('trk_token');
  if (!serverUrl || !token) {
    el.innerHTML += '<div style="margin-top:16px;color:var(--text3)">Audit log requires server connection and admin login.</div>';
    return;
  }
  try {
    const r = await fetch(`${serverUrl}/api/audit/view?app=tracking&limit=200`, {
      headers:{'x-session-token': token}, signal: AbortSignal.timeout(5000)
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    const auditSection = document.createElement('div');
    auditSection.style.cssText = 'margin-top:20px';
    auditSection.innerHTML = `
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);margin-bottom:10px">AUDIT LOG (${j.logs.length} entries)</div>
      <div style="background:var(--surface);border-radius:6px;overflow:hidden;max-height:400px;overflow-y:auto">
        ${j.logs.map(l=>`<div style="display:grid;grid-template-columns:140px 80px 100px 1fr;gap:6px;padding:6px 12px;border-bottom:1px solid var(--border);font-size:11px">
          <span style="color:var(--text3);font-family:var(--mono)">${l.ts}</span>
          <span style="color:var(--accent)">${l.username}</span>
          <span style="color:${l.action==='LOGIN'?'var(--accent2)':'var(--text)'}">${l.action}</span>
          <span style="color:var(--text2)">${l.details||'—'}</span>
        </div>`).join('')}
      </div>`;
    el.appendChild(auditSection);
  } catch(e) {}
}

<script>
// ── REAL-TIME SYNC (SSE) ──────────────────────────────
// SAFE: Only syncs when user has been idle 10+ seconds — never interrupts active work
let _sseTrk = null;
let _trkLastInput = 0;
let _trkPendingSync = false;

document.addEventListener('input', () => { _trkLastInput = Date.now(); });
document.addEventListener('change', () => { _trkLastInput = Date.now(); });
document.addEventListener('click', () => { _trkLastInput = Date.now(); });

function connectTrackingSSE() {
  if (!serverUrl || _sseTrk) return;
  _sseTrk = new EventSource(serverUrl + "/api/sync/events?app=tracking");
  _sseTrk.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === "planning_updated") {
        _trkPendingSync = true; // Defer until idle
      }
    } catch(err) {}
  };
  _sseTrk.onerror = () => {
    if (_sseTrk) { _sseTrk.close(); _sseTrk = null; }
    setTimeout(connectTrackingSSE, 15000);
  };
}

// Every 5 seconds: if planning updated AND user idle 10+ seconds → refresh batch list ONLY
setInterval(async () => {
  if (!_trkPendingSync || !serverUrl) return;
  if ((Date.now() - _trkLastInput) < 10000) return; // user still active
  _trkPendingSync = false;
  try {
    // Only refresh the batch/order list — never re-render active scan forms
    const pr = await fetch(serverUrl + '/api/planning/state', {signal: AbortSignal.timeout(5000)});
    if (!pr.ok) return;
    const pj = await pr.json();
    if (pj.ok && pj.state?.orders) {
      const batches = pj.state.orders.filter(o => !o.deleted);
      if (batches.length > 0) {
        state.batches = batches;
        // Silently update only batch <select> dropdowns — never touch scan inputs or forms
        document.querySelectorAll('select.batch-select, select[id*="batch"]').forEach(sel => {
          const cur = sel.value;
          sel.innerHTML = '<option value="">-- Select Batch --</option>' +
            batches.map(b => `<option value="${b.batchNumber||b.id}" ${(b.batchNumber||b.id)===cur?'selected':''}>${b.batchNumber||b.id} — ${b.customer||''}</option>`).join('');
          sel.value = cur;
        });
      }
    }
  } catch(e) {}
}, 5000);

setTimeout(connectTrackingSSE, 2000);
setInterval(() => { if (!_sseTrk) connectTrackingSSE(); }, 30000);

// ── LABEL TABLE FILTER + SORT ─────────────────────
let _lblSortCol = '', _lblSortDir = 1;

function sortLabelsTable(col) {
  if (_lblSortCol === col) _lblSortDir *= -1; else { _lblSortCol = col; _lblSortDir = 1; }
  // Update sort indicators
  ['batch','customer','size','grossqty','maxlabels','generated','printed','remaining'].forEach(c => {
    const el = document.getElementById('sort-'+c);
    if (el) el.textContent = c === col ? (_lblSortDir === 1 ? '↑' : '↓') : '↕';
  });
  const tbody = document.querySelector('#labels-table tbody');
  if (!tbody) return;
  const rows = [...tbody.querySelectorAll('tr.lbl-row')];
  rows.sort((a, b) => {
    const av = (a.dataset[col] || '').toLowerCase();
    const bv = (b.dataset[col] || '').toLowerCase();
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return (an - bn) * _lblSortDir;
    return av.localeCompare(bv) * _lblSortDir;
  });
  rows.forEach(r => tbody.appendChild(r));
  filterLabelsTable();
}

function filterLabelsTable() {
  const fBatch = (document.getElementById('f-batch')?.value || '').toLowerCase();
  const fCustomer = (document.getElementById('f-customer')?.value || '').toLowerCase();
  const fSize = document.getElementById('f-size')?.value || '';
  const fGenerated = document.getElementById('f-generated')?.value || '';
  const fPrinted = document.getElementById('f-printed')?.value || '';
  const fRemaining = document.getElementById('f-remaining')?.value || '';
  const rows = document.querySelectorAll('.lbl-row');
  let visible = 0;
  rows.forEach(row => {
    const d = row.dataset;
    const gen = parseInt(d.generated)||0, maxl = parseInt(d.maxlabels)||0;
    const prt = parseInt(d.printed)||0, rem = parseInt(d.remaining)||0;
    const matchBatch = !fBatch || (d.batch||'').toLowerCase().includes(fBatch);
    const matchCustomer = !fCustomer || (d.customer||'').toLowerCase().includes(fCustomer);
    const matchSize = !fSize || d.size === fSize;
    const matchGen = !fGenerated ||
      (fGenerated==='none' && gen===0) ||
      (fGenerated==='partial' && gen>0 && gen<maxl) ||
      (fGenerated==='full' && gen>=maxl && maxl>0);
    const matchPrinted = !fPrinted ||
      (fPrinted==='none' && prt===0) ||
      (fPrinted==='partial' && prt>0 && prt<gen) ||
      (fPrinted==='all' && prt>=gen && gen>0);
    const matchRemaining = !fRemaining ||
      (fRemaining==='yes' && rem>0) ||
      (fRemaining==='no' && rem===0);
    const show = matchBatch && matchCustomer && matchSize && matchGen && matchPrinted && matchRemaining;
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const countEl = document.getElementById('lbl-filter-count');
  if (countEl) countEl.textContent = `Showing ${visible} of ${rows.length} batches`;
}

</script>
